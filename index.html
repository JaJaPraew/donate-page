<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />

  <title>Support Praew</title>
  <style>

      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7fb;
      color: #333;
      text-align: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { margin-bottom: 8px; }
    p { color: #666; }
    .btn {
      display: block;
      margin: 14px 0;
      padding: 14px;
      border-radius: 999px;
      text-decoration: none;
      background: #ff8fc7;
      color: white;
      font-weight: bold;
    }
    img {
      max-width: 220px;
      border-radius: 16px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Support Praew 💖</h1>
    <p>ขอบคุณที่แวะมาซัพพอร์ตตอนสตรีมนะคะ</p>

    <img src="qr.png" alt="QR Donate" />

    <a class="btn" href="https://your-donate-link.com" target="_blank">
      Donate
    </a>

    <a class="btn" href="https://twitch.tv/yourname" target="_blank">
      My Stream
    </a>

</html>
