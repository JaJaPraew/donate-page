<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support JaJa 💙</title>

    <meta property="og:title" content="Support JaJa 💙">
    <meta property="og:description" content="ช่องทางการสนับสนุนและติดตามผลงานสตรีมของ JaJa">
    <meta property="og:image" content="image.png">
    <meta property="og:url" content="https://jajapraew.github.io/donate-page/">

    <link rel="icon" type="qr/png" href="qr.png">

    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* สีพื้นหลังของหน้าเว็บ */
        body {
            background-color: #f0f5fa; /* สีฟ้าอ่อนอมเทาแบบมินิมอล */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* กล่องการ์ดสีขาวตรงกลาง */
        .card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* เงาบางๆ ให้ดูมีมิติ */
        }

        h1 {
            color: #333333;
            font-size: 26px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #777777;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* ตั้งค่ารูป QR Code */
        .qr-code {
            width: 200px;
            height: 200px;
            object-fit: contain;
            margin-bottom: 30px;
            border-radius: 10px;
        }

        /* ตกแต่งปุ่มกด */
        .btn {
            display: block;
            width: 100%;
            background-color: #93c5fd; /* สีฟ้าของปุ่ม */
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease; /* ทำให้เอฟเฟกต์สมูท */
        }

        /* เอฟเฟกต์เวลาเอาเมาส์ชี้ที่ปุ่ม */
        .btn:hover {
            transform: translateY(-3px); /* ลอยขึ้นนิดนึง */
            box-shadow: 0 5px 15px rgba(147, 197, 253, 0.5); /* เพิ่มเงาสีฟ้า */
            background-color: #7baef2; /* สีเข้มขึ้นนิดนึง */
        }

        .signature {
            color: #bbbbbb;
            font-size: 12px;
            margin-top: 15px;
        }

        /* ส่วนท้ายสุดของหน้าเว็บ */
        footer {
            text-align: center;
            color: #888888;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Support JaJa 💙</h1>
        <p class="subtitle">ขอบคุณที่แวะมาซัพพอร์ตตอนสตรีมนะคะ</p>

        <img src="image.png" alt="QR Code" class="qr-code">

        <a href="#" class="btn">💸 โดเนทขึ้นจอ</a>
        <a href="#" class="btn">🎮 My Stream</a>

        <p class="signature">꒰ imyour JaJa ꒱</p>
    </div>

    <footer>
        &copy; 2026 JaJa Stream. All rights reserved. <br>
        Contact for work: praewsuja@gmail.com
    </footer>

</body>
</html>
